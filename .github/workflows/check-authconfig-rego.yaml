name: Check AuthConfig Rego matches base

on:
  pull_request:

concurrency:
  group: "check-authconfig-rego-${{ github.head_ref || github.run_id }}"
  cancel-in-progress: true

jobs:
  check-authconfig-rego:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Verify overlay Rego policies match base
        run: python3 scripts/sync-authconfig-rego.py
