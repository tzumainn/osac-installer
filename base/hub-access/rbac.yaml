apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hub-access
rules:
  - apiGroups:
      - osac.openshift.io
    resources:
      - clusterorders
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - osac.openshift.io
    resources:
      - clusterorders/status
    verbs:
      - get
  - apiGroups:
      - osac.openshift.io
    resources:
      - computeinstances
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - osac.openshift.io
    resources:
      - computeinstances/status
    verbs:
      - get
  - apiGroups:
      - osac.openshift.io
    resources:
      - virtualnetworks
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - osac.openshift.io
    resources:
      - virtualnetworks/status
    verbs:
      - get
  - apiGroups:
      - osac.openshift.io
    resources:
      - subnets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - osac.openshift.io
    resources:
      - subnets/status
    verbs:
      - get
  - apiGroups:
      - osac.openshift.io
    resources:
      - securitygroups
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - osac.openshift.io
    resources:
      - securitygroups/status
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
  - apiGroups:
      - osac.openshift.io
    resources:
      - publicippools
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - osac.openshift.io
    resources:
      - publicippools/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hub-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hub-access
subjects:
  - kind: ServiceAccount
    name: hub-access
    namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hub-access-console
rules:
  - apiGroups:
      - subresources.kubevirt.io
    resources:
      - virtualmachineinstances/console
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hub-access-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hub-access-console
subjects:
  - kind: ServiceAccount
    name: hub-access
    namespace: default
